<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sahil</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  background: #000;
  overflow-x: hidden;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  filter: brightness(0.4);
}

/* PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero-img {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid gold;
  box-shadow: 0 0 25px gold;
  margin-bottom: 20px;
}

h1 {
  font-family: 'Playfair Display';
  color: gold;
}

.typing {
  max-width: 600px;
  opacity: 0.9;
}

/* BUTTON */
.btn {
  padding: 12px 30px;
  border-radius: 30px;
  border: none;
  background: gold;
  color: black;
  cursor: pointer;
  margin-top: 20px;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  text-align: center;
}

/* GLASS */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  max-width: 700px;
  margin: auto;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 15px;
}
.gallery img {
  width: 100%;
  border-radius: 15px;
  transition: 0.5s;
}
.gallery img:hover {
  transform: scale(1.1);
}

/* COUNTDOWN */
.countdown {
  font-size: 2rem;
}

/* FORM */
input, textarea {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-golden-particles-1570/1080p.mp4">
</video>

<canvas id="particles"></canvas>
<canvas id="confetti"></canvas>

<!-- HERO -->
<section class="hero">
  <!-- 🔥 YOUR IMAGE -->
  <img src="YOUR_IMAGE.jpg" class="hero-img">

  <h1>Happy Birthday Sahil 🎉</h1>
  <div class="typing" id="typing"></div>
  <button class="btn" onclick="startConfetti()">Celebrate 🎇</button>
</section>

<!-- MESSAGE -->
<section>
  <div class="card">
    <h2>💌 Message</h2>
    <p contenteditable="true">
      Today is your day — keep shining like gold ✨
    </p>
  </div>
</section>

<!-- GALLERY -->
<section>
  <h2>📸 Memories</h2>
  <div class="gallery">
    <img src="YOUR_IMAGE.jpg">
    <img src="https://picsum.photos/300?2">
    <img src="https://picsum.photos/300?3">
  </div>
</section>

<!-- COUNTDOWN -->
<section>
  <h2>⏳ Countdown</h2>
  <div class="countdown" id="countdown"></div>
</section>

<!-- MUSIC -->
<section>
  <audio controls autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
  </audio>
</section>

<!-- WISH -->
<section>
  <h2>💬 Wishes</h2>
  <input placeholder="Your Name">
  <textarea placeholder="Your wish"></textarea><br>
  <button class="btn">Send</button>
</section>

<footer style="padding:20px;">
  Made with ❤️ for Sahil
</footer>

<script>
// 🔥 TYPING EFFECT
const text = "Wishing you success, happiness & luxury life ✨";
let i = 0;
function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type,40);
  }
}
type();

// 🔥 COUNTDOWN
const target = new Date("2026-12-31").getTime();
setInterval(()=>{
  let now = new Date().getTime();
  let diff = target - now;

  let d = Math.floor(diff/(1000*60*60*24));
  let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((diff%(1000*60*60))/(1000*60));
  let s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    `${d}d ${h}h ${m}m ${s}s`;
},1000);

// 🔥 GOLD PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "gold";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y += p.d;
    if(p.y > canvas.height) p.y = 0;
  });
}
setInterval(drawParticles,30);

// 🎇 CONFETTI
const confettiCanvas = document.getElementById("confetti");
const cctx = confettiCanvas.getContext("2d");
confettiCanvas.width = window.innerWidth;
confettiCanvas.height = window.innerHeight;

let confetti = [];

function startConfetti(){
  for(let i=0;i<150;i++){
    confetti.push({
      x: Math.random()*window.innerWidth,
      y: Math.random()*window.innerHeight,
      r: Math.random()*6,
      dx: Math.random()-0.5,
      dy: Math.random()*3
    });
  }
  animateConfetti();
}

function animateConfetti(){
  cctx.clearRect(0,0,window.innerWidth,window.innerHeight);
  confetti.forEach(p=>{
    p.x += p.dx;
    p.y += p.dy;
    cctx.fillStyle = "gold";
    cctx.fillRect(p.x,p.y,p.r,p.r);
  });
  requestAnimationFrame(animateConfetti);
}
</script>

</body>
</html>
